# Render Blueprint for PROTECH (single service: API + built React client).
# In Render: New > Blueprint > connect this repo. Then fill in the env vars
# marked `sync: false` in the dashboard (they are NOT stored in git).
services:
  - type: web
    name: protech
    runtime: node
    plan: free
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_EMBEDDED_DB
        value: "false"
      # A strong secret is generated once by Render and kept stable across deploys.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Fill these in the Render dashboard (kept out of git):
      - key: MONGO_URI            # MongoDB Atlas connection string
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: PROTECH
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_SETUP_KEY
        sync: false
