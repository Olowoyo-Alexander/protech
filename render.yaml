# Render Blueprint for the PROTECH API (backend).
# In Render: New > Blueprint > connect this repo. Then fill in the env vars
# marked `sync: false` in the dashboard (they are NOT stored in git).
# The Vite frontend deploys separately on Vercel (see client/vercel.json).
services:
  - type: web
    name: protech-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_EMBEDDED_DB
        value: "false"
      # A strong secret is generated once by Render and kept stable across deploys.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Fill these in the Render dashboard (kept out of git):
      - key: MONGO_URI            # MongoDB Atlas connection string
        sync: false
      - key: CLIENT_URL           # the deployed Vercel URL, e.g. https://protech.vercel.app
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
